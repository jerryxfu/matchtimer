name: Build

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 25
      - name: setup gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-disabled: false
      - name: Build
        run: chmod +x ./gradlew && ./gradlew build
