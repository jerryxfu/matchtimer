name: Build server

on:
  push:
    paths:
      - 'shared/**'
      - 'server/**'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '*.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/build-server.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-disabled: false
      - name: Build
        run: chmod +x ./gradlew && ./gradlew :server:build
