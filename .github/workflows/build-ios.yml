name: Build iosApp
on:
  push:
    paths:
      - 'iosApp/**'
      - 'shared/**'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '*.gradle.kts'
      - '*.gradle'
      - '*.properties'
      - 'libs.versions.toml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: false

      - name: Build shared framework
        run: chmod +x ./gradlew && ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64

      - name: Build iosApp
        run: |
          xcodebuild \
            -project iosApp/TechNexus.xcodeproj \
            -scheme TechNexus \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build
